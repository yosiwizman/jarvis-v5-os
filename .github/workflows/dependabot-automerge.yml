# Dependabot Auto-Merge Workflow
# Automatically merges Dependabot PRs for patch and minor updates after CI passes.
#
# IMPORTANT: This workflow requires "Allow auto-merge" to be enabled in repository settings:
# Settings > General > Pull Requests > Allow auto-merge
#
# Major version updates are NOT auto-merged and require manual review.

name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-automerge:
    name: Enable Auto-Merge for Dependabot
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.draft == false

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for patch/minor updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "⚠️ **Major version update detected**

          This PR contains a major version bump and requires manual review before merging.

          **Review checklist:**
          - [ ] Read the release notes and changelog
          - [ ] Check for breaking changes
          - [ ] Verify compatibility with existing code
          - [ ] Run full test suite locally if needed

          Once reviewed, merge manually using squash merge."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
