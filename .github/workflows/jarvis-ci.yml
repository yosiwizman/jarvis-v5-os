name: Jarvis V5 CI

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit Tests (Settings Normalization)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run settings normalization tests
        run: npm run test:settings

  contract-tests:
    name: Contract Tests (Settings API)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run settings contract tests
        run: npm run test:contract

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fix for eslint-config-next module resolution in npm workspaces:
      # NODE_PATH must include the workspace node_modules where 'next' is installed
      - name: Lint (web)
        env:
          NODE_PATH: ${{ github.workspace }}/apps/web/node_modules
        run: npm run lint -w @jarvis/web

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Smoke tests
        run: npm run ci:smoke

  e2e-smoke:
    name: E2E Smoke Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Start server and run E2E tests
        run: |
          npm run start:ci &
          npx wait-on -t 120000 tcp:localhost:3000 tcp:localhost:1234
          sleep 5
          PLAYWRIGHT_BASE_URL=http://localhost:3000 npm run test:e2e:ci
        env:
          DISABLE_HTTPS: 'true'
          BACKEND_URL: 'http://localhost:1234'
          CI: true

  # Security gate: npm audit for dependency vulnerabilities
  # Fails on CRITICAL vulnerabilities only (high/moderate are tracked separately)
  sca:
    name: SCA (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fix auto-fixable vulnerabilities without breaking changes
      - name: Auto-fix vulnerabilities
        run: npm audit fix || true

      # Fail on critical vulnerabilities only
      - name: Run npm audit
        run: npm audit --audit-level=critical
