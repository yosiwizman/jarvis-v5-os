      <stop offset="0%" stop-color="#63f6ff" stop-opacity="0"/>
      <stop offset="14%" stop-color="#63f6ff" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#eaffff" stop-opacity="1"/>
