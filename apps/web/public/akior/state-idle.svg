<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
<defs>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="14" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="orbGradIdle" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
    <stop offset="20%" stop-color="#d9ffff" stop-opacity="1"/>
    <stop offset="52%" stop-color="#6ef4ff" stop-opacity="0.58"/>
    <stop offset="100%" stop-color="#00d7ff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="orbGradActive" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
    <stop offset="18%" stop-color="#efffff" stop-opacity="1"/>
    <stop offset="48%" stop-color="#82fbff" stop-opacity="0.84"/>
    <stop offset="100%" stop-color="#00ecff" stop-opacity="0"/>
  </radialGradient>
</defs>
