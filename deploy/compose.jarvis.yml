# AKIOR V6 Local Host Deployment
# 
# Runs web + server with Caddy reverse proxy for same-origin routing.
# Access methods:
#   - HTTPS (secure): https://akior.local/ or https://jarvis.local/ (camera works)
#   - HTTP (fallback): http://<host-ip>/ (port 80)
#   - Localhost: http://localhost:3000/ (for Tailscale Serve)
#
# HTTPS uses Caddy's internal CA (tls internal) - no manual cert generation needed.
# To trust on Windows:
#   1. Export CA: docker cp jarvis-caddy:/data/caddy/pki/authorities/local/root.crt ./caddy-root-ca.crt
#   2. Import: Run ops/windows/import-lan-rootca.ps1 as Admin
#   3. See docs/runbook/lan-access.md for details
#
# Usage:
#   docker compose -f deploy/compose.jarvis.yml up -d --build
#   docker compose -f deploy/compose.jarvis.yml logs -f
#   docker compose -f deploy/compose.jarvis.yml down

services:
  # Caddy reverse proxy - handles routing, WebSocket upgrades, and TLS
  caddy:
    image: caddy:2-alpine
    container_name: jarvis-caddy
    restart: unless-stopped
    ports:
      - "0.0.0.0:443:443"         # LAN HTTPS access (secure, camera works)
      - "0.0.0.0:80:80"           # LAN HTTP fallback (no camera)
      - "127.0.0.1:3000:3000"     # Localhost for Tailscale Serve
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data               # Persists internal CA and certs
    networks:
      - jarvis-net
    depends_on:
      - web
      - server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Next.js web frontend
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: jarvis-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
    expose:
      - "3001"
    networks:
      - jarvis-net
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Fastify + Socket.IO backend server
  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    container_name: jarvis-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=1234
      - HOST=0.0.0.0
    env_file:
      - jarvis.env
    expose:
      - "1234"
    volumes:
      - jarvis-data:/app/data
    networks:
      - jarvis-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:1234/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  jarvis-net:
    driver: bridge

volumes:
  jarvis-data:
    driver: local
  caddy_data:
    driver: local
