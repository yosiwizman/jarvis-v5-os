# JARVIS V5/V6 Local Host Deployment
# 
# Runs web + server with Caddy reverse proxy for same-origin routing.
# Tailscale Serve connects to port 3000 for tailnet-only HTTPS access.
#
# Usage:
#   docker compose -f deploy/compose.jarvis.yml up -d --build
#   docker compose -f deploy/compose.jarvis.yml logs -f
#   docker compose -f deploy/compose.jarvis.yml down

services:
  # Caddy reverse proxy - handles routing and WebSocket upgrades
  caddy:
    image: caddy:2-alpine
    container_name: jarvis-caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - jarvis-net
    depends_on:
      - web
      - server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Next.js web frontend
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: jarvis-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
    expose:
      - "3001"
    networks:
      - jarvis-net
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Fastify + Socket.IO backend server
  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    container_name: jarvis-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=1234
      - HOST=0.0.0.0
    env_file:
      - jarvis.env
    expose:
      - "1234"
    volumes:
      - jarvis-data:/app/data
    networks:
      - jarvis-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:1234/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  jarvis-net:
    driver: bridge

volumes:
  jarvis-data:
    driver: local
