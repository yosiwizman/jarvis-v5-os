# AKIOR V6 Local Host Deployment
# 
# Runs web + server with Caddy reverse proxy for same-origin routing.
# Access methods:
#   - HTTPS (secure): https://akior.local/ or https://akior.home.arpa/ (camera works)
#   - HTTP (fallback): http://<host-ip>/ (port 80)
#   - Localhost: http://localhost:3000/ (for Tailscale Serve)
#
# HTTPS uses Caddy's internal CA (tls internal) - no manual cert generation needed.
# To trust on Windows (enables mic/camera access):
#   .\ops\trust-lan-https.ps1 -Apply
# See docs/networking/trusted-lan-https.md for details.
#
# Deployment (single-command):
#   cd /opt/jarvis/JARVIS-V5-OS && git pull
#   GIT_SHA=$(git rev-parse --short HEAD) docker compose -f deploy/compose.jarvis.yml up -d --build
#
# Verify deployment:
#   curl -sk https://akior.local/api/ops/drift
#
# Logs:
#   docker compose -f deploy/compose.jarvis.yml logs -f
#
# Shutdown:
#   docker compose -f deploy/compose.jarvis.yml down

services:
  # Caddy reverse proxy - handles routing, WebSocket upgrades, and TLS
  caddy:
    image: caddy:2-alpine
    container_name: jarvis-caddy
    restart: unless-stopped
    ports:
      - "0.0.0.0:443:443"         # LAN HTTPS access (secure, camera works)
      - "0.0.0.0:80:80"           # LAN HTTP fallback (no camera)
      - "127.0.0.1:3000:3000"     # Localhost for Tailscale Serve
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data               # Persists internal CA and certs
    networks:
      - jarvis-net
    depends_on:
      - web
      - server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Next.js web frontend
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: jarvis-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
      # Runtime SHA for /api/health/build endpoint
      - WEB_GIT_SHA=${GIT_SHA:-unknown}
    expose:
      - "3001"
    networks:
      - jarvis-net
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Fastify + Socket.IO backend server
  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: jarvis-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=1234
      - HOST=0.0.0.0
      # Runtime SHA for /api/ops/drift endpoint
      - GIT_SHA=${GIT_SHA:-unknown}
      - APP_GIT_SHA=${GIT_SHA:-unknown}
    env_file:
      - jarvis.env
    expose:
      - "1234"
    volumes:
      - jarvis-data:/app/data
    networks:
      - jarvis-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:1234/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Tailscale zero-trust remote access (optional, profile-gated)
  # Enable with: docker compose --profile remote-access up -d
  # Requires: deploy/secrets/tailscale.env with TS_AUTHKEY set
  tailscale:
    image: tailscale/tailscale:stable
    container_name: jarvis-tailscale
    hostname: jarvis-tailscale
    restart: unless-stopped
    profiles:
      - remote-access
    # Host networking: simplifies access to localhost services (Caddy/web/server)
    # Tailscale will use the host's network stack directly
    network_mode: "host"
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    env_file:
      - secrets/tailscale.env
    volumes:
      - tailscale-state:/var/lib/tailscale
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false

networks:
  jarvis-net:
    driver: bridge

volumes:
  jarvis-data:
    driver: local
  caddy_data:
    driver: local
  tailscale-state:
    driver: local
